version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    # Security updates are always opened regardless of the schedule.
    # Group minor and patch updates to reduce PR noise.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
