name: Backend CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      # `pnpm audit` is broken as of 2026-07: npm retired the legacy audit
      # REST endpoints it depends on (410 Gone), and no stable pnpm release
      # has migrated to the replacement bulk-advisory endpoint yet (only
      # 12.0.0-alpha builds have). `npm audit` already works against that
      # endpoint, but needs an npm-style lockfile — generated here in an
      # isolated temp dir from package.json alone, so it never touches this
      # job's real pnpm-managed node_modules/lockfile. Revert to `pnpm audit`
      # once pnpm ships a stable fix.
      - name: Dependency audit
        run: |
          AUDIT_DIR=$(mktemp -d)
          cp package.json "$AUDIT_DIR/"
          cd "$AUDIT_DIR"
          npm i --package-lock-only --no-audit --ignore-scripts
          npm audit --audit-level=high

  deploy:
    name: Deploy to Production
    needs: build-test-audit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /var/www/quantum-trade/Trading-view-BOT-BE

            echo "Checking repository file ownership..."
            WRONG_OWNER=$(find . -not -user "$(whoami)" -print -quit 2>/dev/null || true)
            if [ -n "$WRONG_OWNER" ]; then
              echo "Found files not owned by $(whoami) (e.g. $WRONG_OWNER). Attempting to fix..."
              if sudo -n chown -R "$(whoami):$(whoami)" /var/www/quantum-trade/Trading-view-BOT-BE 2>/dev/null; then
                echo "Ownership fixed."
              else
                echo "ERROR: repo contains files owned by another user, so git fetch would fail."
                echo "Fix on the server:  sudo chown -R $(whoami):$(whoami) /var/www/quantum-trade/Trading-view-BOT-BE"
                echo "Cause: git/pnpm was run with sudo in this directory at some point - never do that."
                exit 1
              fi
            fi

            echo "Fetching latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "Running database migrations..."
            export AWS_REGION=eu-west-2
            export SECRET_NAME_APP=prod-quantum-trade
            pnpm migration:run

            echo "Building application..."
            pnpm build

            echo "Restarting application..."
            pm2 startOrRestart ecosystem.config.js --only trading_view_bot --update-env
            pm2 save

            echo "Waiting for application to start..."
            sleep 10

            echo "Running health check..."

            for i in {1..5}; do
              if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
                echo "Deployment successful."
                exit 0
              fi

              sleep 3
            done

            echo "Health check failed."
            exit 1
