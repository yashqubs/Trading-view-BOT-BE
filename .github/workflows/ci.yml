name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Dependency audit (fail on high/critical)
        run: pnpm audit --audit-level=high

  # Deploys only real pushes to main (never PRs, never `develop`), and only
  # after build-test-audit passes — a red CI run never reaches production.
  # Requires repo secrets EC2_HOST, EC2_SSH_USER, EC2_SSH_KEY (private key
  # matching a public key already in that user's ~/.ssh/authorized_keys on
  # the server) and repo variable DEPLOY_PATH (where this repo is cloned on
  # the EC2 instance, e.g. /opt/trading-view-bot-backend). Single fork PM2
  # instance per CLAUDE.md — never scale this to multiple instances/servers
  # without redesigning IG session + in-memory duplicate-signal state.
  deploy:
    needs: build-test-audit
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            pnpm install --frozen-lockfile
            pnpm migration:run
            pnpm build
            pm2 restart trading_view_bot --update-env
            pm2 save
